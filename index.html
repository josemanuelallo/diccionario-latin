<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario Latín</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <h1>Diccionario Latín-Español</h1>

<p id="subtitulo">Consulta rápida de vocabulario latino</p>

<div class="zona-busqueda">

    <input
        type="text"
        id="buscador"
        placeholder="Buscar en latín o español..."
    >

    <button id="limpiar">✖</button>

</div>


<div id="contador"></div>

<div id="resultados"></div>

<div id="firma-romana">
    <div id="spqr">SPQR</div>
    <div id="spqr-subtitulo">Senatus Populusque Romanus</div>
</div>

    <script src="script.js"></script>

</body>
</html>
